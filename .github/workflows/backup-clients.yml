# Respaldo diario de clientes desde Supabase
# Se ejecuta cada día y permite ejecución manual

name: Backup clientes diario

# Repos with restrictive default token need this for artifact upload
permissions:
  contents: read
  actions: write

on:
  schedule:
    # 6:00 AM UTC = ~1:00 AM Ecuador
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Permite ejecutar manualmente desde la pestaña Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    # Job-level env so every step (including Python) receives the same secrets
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Public project URL (same as Streamlit). Org secrets sometimes only store the key.
      - name: URL de Supabase si el secret SUPABASE_URL está vacío
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "SUPABASE_URL=https://mjylvwhyxnoqlieuhapv.supabase.co" >> $GITHUB_ENV
            echo "Using default Supabase project URL (SUPABASE_URL secret was empty)."
          fi

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install supabase python-dotenv

      - name: Comprobar repositorio y SUPABASE_KEY
        run: |
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Secrets page: https://github.com/$GITHUB_REPOSITORY/settings/secrets/actions"
          if [ -z "$SUPABASE_KEY" ]; then
            echo "::error::SUPABASE_KEY is empty. This workflow needs the anon key."
            echo "::error::Add Repository secret SUPABASE_KEY on THIS repo (Care-tech-innovations/mini_crm), not your fork."
            echo "::error::If using Organization secrets: Org Settings → Secrets → each secret → Repository access → enable mini_crm."
            exit 1
          fi
          echo "SUPABASE_KEY is set. Ready to run backup."

      - name: Ejecutar respaldo
        run: python scripts/export_backup.py

      - name: Subir backup como artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-clientes-${{ github.run_number }}
          path: backups/
