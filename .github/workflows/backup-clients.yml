# Respaldo diario de clientes desde Supabase
# Se ejecuta cada día y permite ejecución manual

name: Backup clientes diario

# Repos with restrictive default token need this for artifact upload
permissions:
  contents: read
  actions: write

on:
  schedule:
    # 6:00 AM UTC = ~1:00 AM Ecuador
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Permite ejecutar manualmente desde la pestaña Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    # Job-level env so every step (including Python) receives the same secrets
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install supabase python-dotenv

      - name: Comprobar repositorio y secrets
        run: |
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Este workflow debe tener secrets en: https://github.com/$GITHUB_REPOSITORY/settings/secrets/actions"
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "::error::SUPABASE_URL o SUPABASE_KEY vacíos."
            echo "::error::1) Abre Settings → Secrets and variables → Actions en ESTE repo (no en tu fork)."
            echo "::error::2) Crea Repository secrets: SUPABASE_URL y SUPABASE_KEY (mismos valores que Streamlit Cloud)."
            echo "::error::3) Si usas Organization secrets: en la org → Secrets → edita el secret → Repository access → añade mini_crm."
            exit 1
          fi
          echo "Secrets OK (no se muestran valores)."

      - name: Ejecutar respaldo
        run: python scripts/export_backup.py

      - name: Subir backup como artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-clientes-${{ github.run_number }}
          path: backups/
